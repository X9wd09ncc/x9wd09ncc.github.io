<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>俄罗斯方块 - 经典益智游戏</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-wrapper">
        <!-- 标题行 -->
        <div class="title-row">
            <h1 class="game-title">🎮 俄罗斯方块</h1>
        </div>
        <!-- 左侧：信息面板（得分、最高分、下一个） -->
        <div class="info-panel">
            <div class="score-box">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="bestScore">0</div>
            </div>
            <div class="next-box">
                <div class="label">下一个</div>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
        </div>

        <!-- 中间：游戏区域 + 下方操作按钮 -->
        <div class="game-area">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="action-buttons">
                <button id="leftBtn" class="move-btn">◀</button>
                <button id="rightBtn" class="move-btn">▶</button>
                <button id="rotateBtn" class="move-btn">↻</button>
                <button id="downBtn" class="move-btn">▼</button>
                <button id="dropBtn" class="move-btn">⬇︎⬇︎</button>
            </div>
        </div>

        <!-- 右侧：控制按钮 -->
        <div class="control-panel">
            <button id="startBtn" class="ctrl-btn start">▶ 开始游戏</button>
            <button id="resetBtn" class="ctrl-btn reset">🔄 新游戏</button>
            <button id="pauseBtn" class="ctrl-btn pause">⏸ 暂停</button>
            <button id="rulesBtn" class="ctrl-btn rules">📖 规则</button>
        </div>
    </div>

    <!-- 自定义弹窗（游戏结束） -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">🎮</div>
            <div class="modal-title">游戏结束</div>
            <div class="modal-message">很遗憾，方块已堆满顶部！</div>
            <div class="modal-score">最终得分：<span id="finalScore">0</span></div>
            <button id="modalRestartBtn" class="modal-btn">开始新游戏</button>
        </div>
    </div>

    <!-- 自定义弹窗（规则说明） -->
    <div id="rulesModal" class="modal">
        <div class="modal-content rules-content">
            <div class="modal-icon">🎯</div>
            <div class="modal-title">游戏规则</div>
            <div class="rules-list">
                <div class="rule-item">
                    <span class="rule-key">⬅ ➡</span>
                    <span class="rule-desc">左右移动方块</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">⬆</span>
                    <span class="rule-desc">旋转方块</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">⬇</span>
                    <span class="rule-desc">加速下落</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">空格</span>
                    <span class="rule-desc">一键到底</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">📱 按钮</span>
                    <span class="rule-desc">移动端触摸操作</span>
                </div>
            </div>
            <div class="rule-tip">💡 提示：消除行数越多，得分越高！<br>一次消除4行可获得800分奖励</div>
            <button class="modal-btn close-rules">知道了，开始玩</button>
        </div>
    </div>

    <script src="tetris.js"></script>
</body>

</html>

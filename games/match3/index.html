<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>消消乐 - 宝石迷阵</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-wrapper">
        <!-- 标题行 -->
        <div class="title-row">
            <h1 class="game-title">💎 消消乐</h1>
        </div>

        <!-- 左侧信息面板 -->
        <div class="info-panel">
            <div class="score-box">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="bestScore">0</div>
            </div>
            <div class="score-box">
                <div class="label">剩余时间</div>
                <div class="value" id="timer">60</div>
            </div>
        </div>

        <!-- 中间游戏区域 -->
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="action-buttons">
                <button id="resetBtn" class="move-btn">🔄 新游戏</button>
            </div>
        </div>

        <!-- 右侧控制面板 -->
        <div class="control-panel">
            <div class="size-selector">
                <label>网格大小</label>
                <div class="size-buttons">
                    <button data-size="6" class="size-btn">6x6</button>
                    <button data-size="8" class="size-btn active">8x8</button>
                    <button data-size="10" class="size-btn">10x10</button>
                </div>
            </div>
            <button id="startBtn" class="ctrl-btn start">▶ 开始游戏</button>
            <button id="resetBtn" class="ctrl-btn reset">🔄 新游戏</button>
            <button id="pauseBtn" class="ctrl-btn pause">⏸ 暂停</button>
            <button id="rulesBtn" class="ctrl-btn rules">📖 规则</button>
        </div>
    </div>

    <!-- 自定义弹窗（游戏结束） -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">💎</div>
            <div class="modal-title">时间到！</div>
            <div class="modal-message">游戏结束，再接再厉！</div>
            <div class="modal-score">最终得分：<span id="finalScore">0</span></div>
            <button id="modalRestartBtn" class="modal-btn">再来一局</button>
        </div>
    </div>

    <!-- 自定义弹窗（规则说明） -->
    <div id="rulesModal" class="modal">
        <div class="modal-content rules-content">
            <div class="modal-icon">🎯</div>
            <div class="modal-title">游戏规则</div>
            <div class="rules-list">
                <div class="rule-item">
                    <span class="rule-key">🖱️ 点击</span>
                    <span class="rule-desc">点击选中宝石</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">🔄 交换</span>
                    <span class="rule-desc">再点击相邻宝石交换位置</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">✨ 消除</span>
                    <span class="rule-desc">三个以上同色相连自动消除</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">📈 得分</span>
                    <span class="rule-desc">每消除一块+10分,连续消除有加成</span>
                </div>
                <div class="rule-item">
                    <span class="rule-key">⏱️ 限时</span>
                    <span class="rule-desc">60秒内尽可能获得高分</span>
                </div>
            </div>
            <div class="rule-tip">💡 提示：只有交换后能形成消除才允许交换！</div>
            <button class="modal-btn close-rules">开始挑战</button>
        </div>
    </div>

    <script src="match3.js"></script>
</body>

</html>
